<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KlevinPlan</title>
  <style>
    /* базовая палитра приложения */
    :root {
      --navy: #071B3D;
      --blue: #0B2A5B;
      --soft: #F8F1E7;
      --milk: #FFFDF8;
      --line: #E6DCCA;
      --gold: #D9C7A7;
      --text: #2E4773;
      --muted: #7888A5;
      --green: #2F8C67;
      --green-bg: #E8F7F0;
      --yellow: #A96F00;
      --yellow-bg: #FFF3D7;
      --red: #A23A3A;
      --red-bg: #FFF0F0;
      --violet: #6969B3;
    }
    /* общие размеры элементов */
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--soft);
      color: var(--text);
      overflow-x: hidden;
    }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    .hidden { display: none !important; }
    /* экран входа и регистрации */
    .login {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      background: radial-gradient(circle at 16% 15%, rgba(217,199,167,.22), transparent 28%), radial-gradient(circle at 70% 80%, rgba(63,112,189,.22), transparent 30%), var(--navy);
      color: var(--soft);
    }
    .hero {
      padding: 64px 72px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 900;
      font-size: 28px;
    }
    .logo {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: var(--gold);
      color: var(--navy);
      display: grid;
      place-items: center;
      font-weight: 950;
    }
    .hero h1 {
      max-width: 780px;
      margin: 0;
      font-size: 60px;
      line-height: 1.05;
      letter-spacing: -2px;
    }
    .hero p {
      max-width: 700px;
      margin: 0;
      color: #DDE7F7;
      font-size: 19px;
      line-height: 1.75;
    }
    .hero-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 780px;
    }
    .hero-card {
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.08);
      border-radius: 24px;
      padding: 20px;
    }

    /* всплывающие уведомления */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10000;
    }
    .toast {
      display: block;
      padding: 10px 16px;
      margin-bottom: 10px;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      opacity: 0.95;
      animation: fadeOut 3s forwards;
    }
    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }
    @keyframes fadeOut {
      0% { opacity: 0.95; }
      80% { opacity: 0.95; }
      100% { opacity: 0; }
    }

    /* блок календаря */
    .calendar-container {
      margin-top: 20px;
    }
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-top: 8px;
    }
    .calendar-day {
      border: 1px solid var(--line);
      background: var(--milk);
      padding: 6px;
      min-height: 70px;
      position: relative;
      border-radius: 4px;
      font-size: 12px;
      color: var(--text);
    }
    .calendar-day .date {
      font-weight: 600;
    }
    .calendar-day .count {
      position: absolute;
      bottom: 4px;
      right: 4px;
      font-size: 10px;
      background: var(--violet);
      color: var(--milk);
      border-radius: 8px;
      padding: 0 4px;
    }
    .calendar-day.today {
      border: 2px solid var(--violet);
      background: #f3f1ff;
    }
    .calendar-day.has-items {
      background: var(--yellow-bg);
    }

    .calendar-day.selected {
      border: 2px solid var(--green);
      background: var(--green-bg);
    }

    .calendar-grid.week-view .calendar-day {
      min-height: 60px;
    }

    .calendar-header .cal-nav,
    .calendar-header .cal-view {
      background: none;
      border: none;
      color: var(--violet);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
    }
    .calendar-header .cal-view {
      font-size: 14px;
    }

    /* меню действий по дате */
    .context-menu {
      position: absolute;
      z-index: 1000;
      background: var(--milk);
      border: 1px solid var(--line);
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      padding: 4px;
      min-width: 120px;
    }
    .context-menu button {
      width: 100%;
      border: none;
      background: none;
      padding: 6px 10px;
      font-size: 13px;
      text-align: left;
      color: var(--text);
    }
    .context-menu button:hover {
      background: var(--line);
    }

    .day-details {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      background: var(--milk);
      border-radius: 4px;
    }
    .day-details h4 {
      margin: 0 0 8px 0;
    }

    .day-actions .btn.small {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      border: none;
      background: var(--violet);
      color: var(--milk);
    }
    .day-actions .btn.small.danger {
      background: var(--red);
    }
    .day-actions .btn.small:hover {
      opacity: 0.9;
    }

    .btn.small {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      line-height: 1;
    }
    .btn.small.danger {
      background: var(--red);
      color: var(--milk);
    }

    .badge {
      background: var(--red);
      color: var(--milk);
      border-radius: 12px;
      padding: 2px 6px;
      margin-left: 6px;
      font-size: 11px;
    }

    .item-head small {
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .hero-card b {
      display: block;
      margin: 10px 0 5px;
      color: #fff;
    }
    .hero-card span {
      color: #BFD0EE;
      font-size: 14px;
      line-height: 1.4;
    }
    .login-panel {
      padding: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      width: min(500px, 100%);
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 34px;
      box-shadow: 0 30px 80px rgba(0,0,0,.32);
      padding: 34px;
      color: var(--text);
    }
    .auth-card h2 {
      margin: 0 0 8px;
      font-size: 30px;
      color: var(--blue);
    }
    .auth-card p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.6;
    }
    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 18px;
    }
    .auth-tabs button {
      border: 0;
      border-radius: 16px;
      padding: 12px;
      background: #EFE5D6;
      color: var(--text);
      font-weight: 850;
    }
    .auth-tabs button.active {
      background: var(--blue);
      color: var(--soft);
    }
    .field {
      display: block;
      margin: 0 0 14px;
    }
    .field span {
      display: block;
      margin: 0 0 7px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .07em;
      font-weight: 850;
      color: var(--muted);
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid #D9D0C4;
      background: var(--milk);
      color: var(--text);
      outline: none;
      border-radius: 16px;
      padding: 13px 15px;
    }
    textarea {
      resize: vertical;
      min-height: 92px;
    }
    .btn {
      border: 0;
      border-radius: 16px;
      padding: 12px 16px;
      background: var(--blue);
      color: var(--soft);
      font-weight: 850;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn.secondary {
      background: #EFE5D6;
      color: var(--text);
    }
    .btn.danger {
      background: var(--red);
      color: #fff;
    }
    .btn.full {
      width: 100%;
      padding: 15px;
    }
    .hint {
      margin-top: 16px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--milk);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .error {
      display: none;
      margin-bottom: 14px;
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid #F3C9C9;
      border-radius: 16px;
      padding: 12px;
    }
    /* основная область приложения */
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 278px 1fr;
    }
    .sidebar {
      background: var(--navy);
      color: var(--soft);
      padding: 20px;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .side-inner {
      height: 100%;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.05);
      border-radius: 30px;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    .side-brand {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 26px;
    }
    .side-brand .logo {
      width: 48px;
      height: 48px;
      border-radius: 16px;
    }
    .side-brand b {
      font-size: 22px;
      color: #fff;
    }
    .side-brand small {
      display: block;
      color: #BFD0EE;
      margin-top: 2px;
    }
    .nav {
      display: grid;
      gap: 8px;
    }
    .nav button {
      border: 0;
      text-align: left;
      border-radius: 18px;
      padding: 13px 14px;
      background: transparent;
      color: #DDE7F7;
      font-weight: 850;
    }
    .nav button.active {
      background: var(--soft);
      color: var(--blue);
    }
    .profile {
      margin-top: auto;
      background: var(--soft);
      color: var(--text);
      border-radius: 24px;
      padding: 16px;
    }
    .profile b {
      display: block;
      margin-bottom: 4px;
      color: var(--blue);
    }
    .profile small {
      color: var(--muted);
      line-height: 1.45;
    }
    .profile .btn {
      width: 100%;
      margin-top: 10px;
    }
    .main {
      padding: 28px;
    }
    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .pill {
      display: inline-flex;
      border: 1px solid var(--line);
      background: #F4EBDD;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 850;
      color: var(--text);
    }
    h2 {
      font-size: 38px;
      line-height: 1.1;
      margin: 10px 0 8px;
      color: var(--blue);
    }
    h3 {
      color: var(--blue);
    }
    .top p {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .select-space {
      width: 300px;
    }
    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(7,27,61,.06);
      padding: 22px;
    }
    .grid3 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }
    .grid2 {
      display: grid;
      gap: 18px;
    }
    /* карточки статистики */
    .stat .n {
      font-size: 34px;
      font-weight: 950;
      color: var(--blue);
      margin-bottom: 4px;
    }
    .stat b {
      display: block;
      color: var(--text);
      margin-bottom: 7px;
    }
    .stat small {
      color: var(--muted);
      line-height: 1.5;
    }
    .list {
      display: grid;
      gap: 12px;
    }
    .item-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
      background: #fff;
      box-shadow: 0 8px 26px rgba(7,27,61,.05);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .item-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .item-card b {
      display: block;
      color: var(--text);
      font-size: 16px;
      margin-bottom: 4px;
    }
    .item-card small {
      color: var(--muted);
      line-height: 1.5;
      white-space: normal;
      word-break: break-word;
      overflow-wrap: anywhere;
      max-width: 100%;
    }
    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .status {
      display: inline-flex;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 850;
      border: 1px solid var(--line);
      background: #F4EBDD;
    }
    .status.ok {
      background: var(--green-bg);
      color: var(--green);
      border-color: #BCE8D2;
    }
    .status.warn {
      background: var(--yellow-bg);
      color: var(--yellow);
      border-color: #F2D48D;
    }
    .status.bad {
      background: var(--red-bg);
      color: var(--red);
      border-color: #F3C9C9;
    }
    .status.file {
      background: #EFEFFF;
      color: var(--violet);
      border-color: #D6D3FF;
    }
    .comments {
      margin-top: 8px;
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }
    .comments.collapsed {
      display: none;
    }
    .comment {
      font-size: 13px;
      background: #F4EBDD;
      border-radius: 12px;
      padding: 8px 10px;
      margin-top: 6px;
      color: var(--text);
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .empty {
      border: 2px dashed #DACFBE;
      border-radius: 24px;
      padding: 26px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,.55);
    }
    .empty b {
      display: block;
      color: var(--text);
      margin-bottom: 8px;
      font-size: 18px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      overflow: hidden;
      border-radius: 18px;
    }
    th, td {
      padding: 13px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #F4EBDD;
      color: var(--text);
    }
    tr:last-child td { border-bottom: 0; }
    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      margin-top: 4px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .tabs button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: #EFE5D6;
      color: var(--text);
      font-weight: 850;
    }
    .tabs button.active {
      background: var(--blue);
      color: var(--soft);
    }
    /* адаптация под маленький экран */
    @media (max-width: 1120px) {
      .login {
        grid-template-columns: 1fr;
      }
      .hero {
        padding: 38px 24px;
      }
      .hero h1 {
        font-size: 44px;
      }
      .hero-cards, .grid3 {
        grid-template-columns: 1fr;
      }
      .login-panel {
        padding: 24px;
      }
      .app {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: relative;
        height: auto;
      }
      .main {
        padding: 18px;
      }
      .top {
        display: block;
      }
      .toolbar {
        margin-top: 14px;
      }
      .select-space {
        width: 100%;
        margin-bottom: 10px;
      }
      .grid2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="app.js"></script>
</body>
</html>
